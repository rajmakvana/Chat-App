
version: '3.8'

services:

  mongo:
    image: mongo:6
    container_name: chat_mongo
    restart : always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend :
    build: ./server
    container_name: chat_backend
    restart : always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/chatapp
      - PORT=3000
    depends_on:
      - mongo

  frontend:
    build: ./client
    container_name: chat_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    

volumes:
  mongo_data: